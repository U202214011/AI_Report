<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Chinook 报告对话工作台</title>
  <style>
    :root{
      --bg:#f6f8fb;
      --panel:#ffffff;
      --line:#e5e7eb;
      --text:#1f2937;
      --muted:#6b7280;
      --brand:#2563eb;
      --u-bg:#eff6ff;
      --u-bd:#dbeafe;
      --a-bg:#f9fafb;
      --a-bd:#e5e7eb;
      --r-bg:#fff7ed;
      --r-bd:#fed7aa;
    }

    * { box-sizing: border-box; }
    body { margin:0; font-family:"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }

    .layout { display:grid; grid-template-columns:340px 1fr 1fr; height:100vh; gap:0; }

    .col {
      background: var(--panel);
      min-width: 0;
      overflow: hidden;
      display:flex;
      flex-direction:column;
    }
    .col + .col { border-left:1px solid var(--line); }

    .panel-head{
      height:52px;
      border-bottom:1px solid var(--line);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 14px;
      background:#fff;
      flex-shrink:0;
    }

    .panel-body{
      flex:1;
      overflow:auto;
      padding:12px;
      min-height:0;
    }

    .badge { padding:4px 10px; border-radius:999px; font-size:12px; }
    .ok { background:#e8f8ee; color:#166534; }
    .warn { background:#fff7e6; color:#92400e; }
    .danger { background:#feecec; color:#991b1b; }

    .tiny { font-size:12px; color:var(--muted); }
    .row { display:flex; gap:8px; margin:8px 0; }

    textarea, input, select {
      width:100%; border:1px solid #d1d5db; border-radius:8px; padding:8px; font:inherit;
    }
    textarea { height:110px; resize:none; }
    button {
      border:none; background:var(--brand); color:#fff; border-radius:8px; padding:0 14px; cursor:pointer;
    }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .btn2 { background:#4b5563; }

    .toggle { display:flex; align-items:center; gap:6px; font-size:12px; }

    .msg {
      margin-bottom:10px;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid var(--a-bd);
      background:var(--a-bg);
      line-height:1.6;
      overflow-wrap:anywhere;
    }
    .u { background:var(--u-bg); border-color:var(--u-bd); }
    .a { background:var(--a-bg); border-color:var(--a-bd); }
    .r { background:var(--r-bg); border-color:var(--r-bd); }

    .msg-role{
      font-size:12px; color:var(--muted); margin-bottom:6px;
    }

    .md h1,.md h2,.md h3,.md h4 { margin:.6em 0 .4em; line-height:1.35; }
    .md h1{ font-size:1.35rem; }
    .md h2{ font-size:1.2rem; }
    .md h3{ font-size:1.05rem; }
    .md p { margin:.45em 0; }
    .md ul,.md ol { margin:.4em 0 .4em 1.2em; }
    .md blockquote{
      margin:.5em 0; padding:.45em .75em;
      border-left:4px solid #d1d5db; color:#374151; background:#fafafa;
    }
    .md code{
      background:#f3f4f6; padding:.1em .35em; border-radius:4px;
      font-family: ui-monospace, Menlo, Monaco, "Courier New", monospace;
      font-size:.92em;
    }
    .md pre{
      background:#0b1020; color:#e5e7eb; padding:10px; border-radius:8px; overflow:auto;
      font-family: ui-monospace, Menlo, Monaco, "Courier New", monospace;
      font-size:.88em;
    }
    .md pre code{ background:transparent; padding:0; color:inherit; }

    .composer{
      border-top:1px solid var(--line);
      padding:10px;
      display:grid;
      grid-template-columns:1fr auto;
      gap:8px;
      background:#fff;
      flex-shrink:0;
    }

    .prompt-box {
      white-space: pre-wrap;
      font-family: ui-monospace, Menlo, Monaco, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.55;
      background: #fcfcff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px;
    }

    .plots img { max-width:100%; border:1px solid #e5e7eb; border-radius:8px; margin-bottom:8px; }

    @media (max-width: 1200px){
      .layout{ grid-template-columns: 320px 1fr; }
      .col-preview{
        grid-column: 1 / -1;
        border-top:1px solid var(--line);
        border-left:none !important;
        height:45vh;
      }
    }
  </style>
</head>
<body>
<div class="layout">
  <!-- 左栏：配置 + 导出 -->
  <aside class="col col-config">
    <div class="panel-head"><strong>数据库筛选配置</strong></div>
    <div class="panel-body">
      <label>报告类型</label>
      <select id="report_type">
        <option value="stat">统计型</option>
        <option value="trend">趋势型</option>
      </select>

      <div class="row">
        <div style="flex:1;">
          <label>指标</label>
          <select id="metric">
            <option value="sales_amount">销售额</option>
            <option value="order_count">订单量</option>
            <option value="avg_order_value">客单价</option>
          </select>
        </div>
        <div style="flex:1;">
          <label>粒度</label>
          <select id="granularity">
            <option value="month">月</option>
            <option value="quarter">季</option>
            <option value="year">年</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div style="flex:1;">
          <label>开始</label>
          <input id="start_date" type="date" />
        </div>
        <div style="flex:1;">
          <label>结束</label>
          <input id="end_date" type="date" />
        </div>
      </div>

      <label>Top N</label>
      <input id="top_n" type="number" value="10" min="1" max="50" />

      <div class="tiny" style="margin-top:10px;">维度</div>
      <div class="tiny">
        <label><input type="checkbox" name="dimension" value="total" checked> 总量</label><br/>
        <label><input type="checkbox" name="dimension" value="genre"> 流派</label><br/>
        <label><input type="checkbox" name="dimension" value="artist"> 艺术家</label><br/>
        <label><input type="checkbox" name="dimension" value="country"> 国家</label><br/>
        <label><input type="checkbox" name="dimension" value="city"> 城市</label><br/>
        <label><input type="checkbox" name="dimension" value="customer"> 客户</label><br/>
        <label><input type="checkbox" name="dimension" value="employee"> 员工</label>
      </div>

      <div class="row" style="margin-top:10px;">
        <button id="genBtn" style="flex:1;">生成并开始对话</button>
        <button id="newBtn" class="btn2">新会话</button>
      </div>

      <label class="toggle">
        <input type="checkbox" id="showReasoning" checked />
        显示思考过程（reasoning）
      </label>

      <hr style="margin:12px 0;border:none;border-top:1px solid #eee;" />
      <div class="tiny" style="margin-bottom:6px;">报告导出</div>

      <label>导出模板</label>
      <select id="exportTemplate">
        <option value="">加载中...</option>
      </select>

      <label style="margin-top:8px; display:block;">导出标题（可选）</label>
      <input id="exportTitle" type="text" placeholder="例如：2026年Q1销售分析报告" />

      <div class="row" style="margin-top:8px;">
        <button id="exportBtn" class="btn2" style="flex:1;">导出 DOCX</button>
      </div>
    </div>
  </aside>

  <!-- 中栏：对话 -->
  <section class="col col-chat">
    <div class="panel-head">
      <strong>LLM 思考与响应（多轮对话）</strong>
      <span id="ctxBadge" class="badge ok">上下文充足</span>
    </div>

    <div id="chatLog" class="panel-body"></div>

    <div class="composer">
      <textarea id="chatInput" placeholder="继续追问，例如：请解释 2024-Q3 的异常波动并给出行动建议"></textarea>
      <button id="sendBtn">发送</button>
    </div>
  </section>

  <!-- 右栏：Prompt + 图 -->
  <section class="col col-preview">
    <div class="panel-head"><strong>Prompt 模板 + 图像预览</strong></div>
    <div class="panel-body">
      <div class="tiny" style="margin-bottom:6px;">当前发送给 LLM 的 Prompt：</div>
      <div id="promptBox" class="prompt-box">尚未生成 Prompt</div>
      <hr style="margin:12px 0;border:none;border-top:1px solid #eee;" />
      <div id="plots" class="plots"><div class="tiny">尚未生成图表</div></div>
    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  let messages = [];
  let sending = false;
  let lastCtxCheckAt = 0;
  let ctxCheckTimer = null;

  const chatLog = document.getElementById('chatLog');
  const plots = document.getElementById('plots');
  const promptBox = document.getElementById('promptBox');
  const ctxBadge = document.getElementById('ctxBadge');
  const exportTemplateSelect = document.getElementById('exportTemplate');
  const exportTitleInput = document.getElementById('exportTitle');

  marked.setOptions({ breaks: true, gfm: true });

  function escapeHtml(s='') {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function renderMarkdownToHtml(md='') {
    try { return marked.parse(md || ''); }
    catch { return `<p>${escapeHtml(md || '')}</p>`; }
  }

  function createMsg(role='assistant', kind='content') {
    const d = document.createElement('div');
    d.className = 'msg ' + (role === 'user' ? 'u' : (kind === 'reasoning' ? 'r' : 'a'));

    const roleTag = document.createElement('div');
    roleTag.className = 'msg-role';
    roleTag.textContent = role === 'user' ? '用户' : (kind === 'reasoning' ? 'LLM 思考' : 'LLM 回复');

    const body = document.createElement('div');
    body.className = 'md';
    body.dataset.raw = '';

    d.appendChild(roleTag);
    d.appendChild(body);
    chatLog.appendChild(d);
    chatLog.scrollTop = chatLog.scrollHeight;
    return { box: d, body };
  }

  function appendMsgMarkdown(bodyEl, appendText='') {
    const raw = (bodyEl.dataset.raw || '') + (appendText || '');
    bodyEl.dataset.raw = raw;
    bodyEl.innerHTML = renderMarkdownToHtml(raw);
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  function pushUserVisible(text) {
    const { body } = createMsg('user', 'content');
    body.dataset.raw = text || '';
    body.innerHTML = renderMarkdownToHtml(text || '');
    messages.push({ role:'user', content:text || '' });
  }

  function getLatestAssistantMarkdown() {
    const last = [...messages].reverse().find(m => m.role === 'assistant' && (m.content || '').trim());
    return (last && last.content) ? last.content.trim() : '';
  }

  const payload = () => ({
    report_type: document.getElementById('report_type').value,
    metric: document.getElementById('metric').value,
    granularity: document.getElementById('granularity').value,
    start_date: document.getElementById('start_date').value || null,
    end_date: document.getElementById('end_date').value || null,
    top_n: Number(document.getElementById('top_n').value || 10),
    dimensions: Array.from(document.querySelectorAll('input[name="dimension"]:checked')).map(x => x.value)
  });

  async function loadExportTemplates() {
    try {
      const res = await fetch('/api/export/templates');
      if (!res.ok) throw new Error('模板接口异常');
      const j = await res.json();
      const arr = j.templates || [];

      exportTemplateSelect.innerHTML = '';
      if (!arr.length) {
        exportTemplateSelect.innerHTML = '<option value="cn_management_a4">cn_management_a4</option>';
        return;
      }

      arr.forEach(t => {
        const op = document.createElement('option');
        op.value = t.id;
        op.textContent = `${t.name || t.id}${t.description ? ' - ' + t.description : ''}`;
        exportTemplateSelect.appendChild(op);
      });
    } catch (e) {
      exportTemplateSelect.innerHTML = '<option value="cn_management_a4">cn_management_a4</option>';
    }
  }

  async function exportDocx() {
    const reportMarkdown = getLatestAssistantMarkdown();
    if (!reportMarkdown) {
      alert('没有可导出的报告内容，请先生成报告。');
      return;
    }

    const templateId = exportTemplateSelect.value || 'cn_management_a4';
    const reportTitle = (exportTitleInput.value || '').trim() || 'Chinook 数据分析报告';

    const btn = document.getElementById('exportBtn');
    const oldText = btn.textContent;
    btn.disabled = true;
    btn.textContent = '导出中...';

    try {
      const res = await fetch('/api/export/report', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          report_markdown: reportMarkdown,
          template_id: templateId,
          report_title: reportTitle
        })
      });

      if (!res.ok) {
        let msg = '导出失败';
        try {
          const j = await res.json();
          msg = j.message || msg;
        } catch {}
        alert(msg);
        return;
      }

      const blob = await res.blob();
      const disposition = res.headers.get('Content-Disposition') || '';
      const matched = disposition.match(/filename\*=UTF-8''([^;]+)|filename="?([^"]+)"?/i);
      const filename = decodeURIComponent((matched && (matched[1] || matched[2])) || 'report.docx');

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    } catch (e) {
      alert('导出失败：' + (e.message || e));
    } finally {
      btn.disabled = false;
      btn.textContent = oldText;
    }
  }

  async function refreshCtx() {
    const res = await fetch('/api/chat/context-check', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        systemPrompt: "你是资深数据分析助手，请严格依据给定报告数据进行回答。",
        messages
      })
    });
    const j = await res.json();
    ctxBadge.textContent = `${j.message}（约 ${j.used_tokens_est}/${j.limit_tokens_est}）`;
    ctxBadge.className = 'badge ' + (j.level === 'danger' ? 'danger' : (j.level === 'warn' ? 'warn' : 'ok'));
  }

  async function refreshCtxThrottled(force=false) {
    const now = Date.now();
    if (!force && now - lastCtxCheckAt < 2500) return;
    lastCtxCheckAt = now;
    await refreshCtx();
  }

  async function runChatSSE() {
    if (sending) return;
    sending = true;
    document.getElementById('sendBtn').disabled = true;

    try {
      const showReasoning = document.getElementById('showReasoning').checked;
      const res = await fetch('/api/chat/sse', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          systemPrompt: "你是资深数据分析助手，请严格依据给定报告数据进行回答。",
          messages,
          show_reasoning: showReasoning
        })
      });

      if (!res.ok || !res.body) {
        const { body } = createMsg('assistant', 'content');
        appendMsgMarkdown(body, '请求失败：' + res.status);
        return;
      }

      // 先思考，再回答（不折叠）
      const reasoning = showReasoning ? createMsg('assistant', 'reasoning') : null;
      const assistant = createMsg('assistant', 'content');

      const reader = res.body.getReader();
      const decoder = new TextDecoder('utf-8');
      let buffer = '';

      while (true) {
        const {value, done} = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, {stream:true});

        let idx;
        while ((idx = buffer.indexOf('\n\n')) >= 0) {
          const raw = buffer.slice(0, idx);
          buffer = buffer.slice(idx + 2);

          const lines = raw.split('\n');
          let ev = 'message';
          let data = '';
          for (const line of lines) {
            if (line.startsWith('event:')) ev = line.slice(6).trim();
            if (line.startsWith('data:')) data += line.slice(5).trim();
          }
          if (!data) continue;

          let obj = {};
          try { obj = JSON.parse(data); } catch { continue; }

          if (ev === 'notice') {
            const { body } = createMsg('assistant', 'content');
            appendMsgMarkdown(body, `⚠️ ${obj.text || ''}`);
          } else if (ev === 'error') {
            const { body } = createMsg('assistant', 'content');
            appendMsgMarkdown(body, `❌ ${obj.message || ''}`);
          } else if (ev === 'reasoning' && reasoning) {
            appendMsgMarkdown(reasoning.body, obj.text || '');
          } else if (ev === 'content') {
            appendMsgMarkdown(assistant.body, obj.text || '');
          } else if (ev === 'context') {
            ctxBadge.textContent = `${obj.message}（约 ${obj.used_tokens_est}/${obj.limit_tokens_est}）`;
            ctxBadge.className = 'badge ' + (obj.level === 'danger' ? 'danger' : (obj.level === 'warn' ? 'warn' : 'ok'));
          }
        }
      }

      messages.push({ role:'assistant', content: assistant.body.dataset.raw || '' });
      await refreshCtxThrottled(true);
    } finally {
      sending = false;
      document.getElementById('sendBtn').disabled = false;
    }
  }

  document.getElementById('genBtn').addEventListener('click', async () => {
    const p = payload();
    plots.innerHTML = '<div class="tiny">生成中...</div>';

    const res = await fetch('/api/generate?debug=1', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(p)
    });
    const j = await res.json();

    if (j.error || j.message) {
      plots.innerHTML = `<div class="tiny">错误：${escapeHtml(j.error || j.message)}</div>`;
      return;
    }

    const promptText = (j.prompt || '').trim();
    promptBox.textContent = promptText || '未返回 prompt';

    plots.innerHTML = '';
    (j.plots || []).forEach(item => {
      const h = document.createElement('h4');
      h.textContent = item.title;
      const img = document.createElement('img');
      img.src = 'data:image/png;base64,' + item.image;
      plots.appendChild(h);
      plots.appendChild(img);
    });

    if (!promptText) {
      const { body } = createMsg('assistant', 'content');
      appendMsgMarkdown(body, '未拿到可用 prompt，请检查 prompt 模板配置。');
      return;
    }

    // prompt注入上下文，不显示到中栏
    messages.push({ role:'user', content: promptText });

    const { body } = createMsg('assistant', 'content');
    appendMsgMarkdown(body, '已基于当前筛选生成 Prompt，并发送给模型。你可以继续多轮追问。');

    await refreshCtxThrottled(true);
    await runChatSSE();
  });

  document.getElementById('sendBtn').addEventListener('click', async () => {
    const ipt = document.getElementById('chatInput');
    const txt = (ipt.value || '').trim();
    if (!txt) return;
    ipt.value = '';
    pushUserVisible(txt);
    await refreshCtxThrottled();
    await runChatSSE();
  });

  document.getElementById('newBtn').addEventListener('click', async () => {
    messages = [];
    chatLog.innerHTML = '';
    promptBox.textContent = '尚未生成 Prompt';
    plots.innerHTML = '<div class="tiny">尚未生成图表</div>';

    const { body } = createMsg('assistant', 'content');
    appendMsgMarkdown(body, '已新建会话。你可以点击“生成并开始对话”。');
    await refreshCtxThrottled(true);
  });

  document.getElementById('exportBtn').addEventListener('click', exportDocx);

  document.getElementById('chatInput').addEventListener('input', () => {
    clearTimeout(ctxCheckTimer);
    ctxCheckTimer = setTimeout(() => refreshCtxThrottled(false), 800);
  });

  // 初始化
  {
    const { body } = createMsg('assistant', 'content');
    appendMsgMarkdown(body, '欢迎使用：左侧配置后生成报告。\n\n- 中栏展示 **先思考、后输出**\n- 左栏可直接选择模板导出 DOCX\n- 右栏展示 **Prompt 与图像**');
  }

  loadExportTemplates();
  refreshCtxThrottled(true);
</script>
</body>
</html>
