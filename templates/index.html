<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Chinook 报告对话工作台</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    :root {
      --bg:#f6f8fb; --panel:#ffffff; --line:#e5e7eb; --text:#1f2937; --muted:#6b7280;
      --brand:#2563eb; --u-bg:#eff6ff; --u-bd:#dbeafe; --a-bg:#f9fafb; --a-bd:#e5e7eb;
      --r-bg:#fff7ed; --r-bd:#fed7aa;
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }

    /* 3-column flex layout */
    .layout { display:flex; height:100vh; }
    .col { background:var(--panel); min-width:0; overflow:hidden; display:flex; flex-direction:column; }
    .col-config { flex: 0 0 360px; border-right:1px solid var(--line); }
    .col-chat { min-width:300px; border-right:1px solid var(--line); }
    .col-preview { flex:1; min-width:300px; }

    /* Resizer */
    .resizer { width:4px; background-color:transparent; cursor:col-resize; align-self:stretch; }
    .resizer:hover { background-color:#2563eb; }
    .resizer.active { background-color:#1d4ed8; }

    /* Panels */
    .panel-head {
      height:52px; border-bottom:1px solid var(--line);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 14px; background:#fff; flex-shrink:0;
    }
    .panel-body { flex:1; overflow:auto; padding:12px; min-height:0; }

    /* context badge - override Bootstrap */
    .ctx-badge { padding:4px 10px; border-radius:999px; font-size:12px; }

    .tiny { font-size:12px; color:var(--muted); }
    .row-inline { display:flex; gap:8px; margin:8px 0; }

    /* Chat */
    .chat-log { flex:1; overflow:auto; padding:10px; }
    .composer {
      border-top:1px solid var(--line); padding:10px;
      display:grid; grid-template-columns:1fr auto; gap:8px;
      background:#fff; flex-shrink:0;
    }
    .composer textarea { height:80px; resize:none; }

    /* Messages */
    .msg {
      margin-bottom:10px; padding:10px 12px; border-radius:10px;
      border:1px solid var(--a-bd); background:var(--a-bg);
      line-height:1.6; overflow-wrap:anywhere;
    }
    .msg-user     { background:var(--u-bg); border-color:var(--u-bd); }
    .msg-assistant{ background:var(--a-bg); border-color:var(--a-bd); }
    .msg-reasoning{ background:var(--r-bg); border-color:var(--r-bd); }
    .msg-notice   { background:#f0f9ff; border:1px solid #bae6fd; border-radius:8px; }
    .msg-role { font-size:12px; color:var(--muted); margin-bottom:6px; }

    /* Markdown rendered content */
    .md h1,.md h2,.md h3,.md h4 { margin:.6em 0 .4em; line-height:1.35; }
    .md h1 { font-size:1.35rem; }
    .md h2 { font-size:1.2rem; }
    .md h3 { font-size:1.05rem; }
    .md p { margin:.45em 0; }
    .md ul,.md ol { margin:.4em 0 .4em 1.2em; }
    .md blockquote {
      margin:.5em 0; padding:.45em .75em; border-left:4px solid #d1d5db;
      color:#374151; background:#fafafa;
    }
    .md code {
      background:#f3f4f6; padding:.1em .35em; border-radius:4px;
      font-family: ui-monospace, Menlo, Monaco, "Courier New", monospace;
      font-size:.92em;
    }
    .md pre {
      background:#0b1020; color:#e5e7eb; padding:10px; border-radius:8px; overflow:auto;
      font-family: ui-monospace, Menlo, Monaco, "Courier New", monospace;
      font-size:.88em;
    }
    .md pre code { background:transparent; padding:0; color:inherit; }

    /* Prompt box */
    .prompt-box {
      white-space:pre-wrap;
      font-family: ui-monospace, Menlo, Monaco, "Courier New", monospace;
      font-size:12px; line-height:1.55;
      background:#fcfcff; border:1px solid #e5e7eb;
      border-radius:8px; padding:10px;
    }
    .plots img { max-width:100%; border:1px solid #e5e7eb; border-radius:8px; margin-bottom:8px; }

    /* Template micro-config card */
    .tpl-card { border:1px solid #e5e7eb; border-radius:8px; padding:8px; margin-top:8px; background:#fbfdff; }
    .tpl-preview {
      margin-top:8px; border:1px dashed #cbd5e1; border-radius:8px; background:#fff;
      padding:12px; max-height:220px; overflow:auto;
    }

    /* Query Preview Modal */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1050;
      display:none; align-items:center; justify-content:center;
    }
    .modal-overlay.open { display:flex; }
    .modal-box {
      background:#fff; border-radius:12px; width:90vw; max-width:1100px; max-height:90vh;
      display:flex; flex-direction:column; box-shadow:0 20px 60px rgba(0,0,0,.3);
    }
    .modal-head {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 18px; border-bottom:1px solid #e5e7eb; flex-shrink:0;
    }
    .modal-head h3 { margin:0; font-size:1rem; }
    .modal-body-scroll { flex:1; overflow:auto; padding:16px; }
    .query-block { margin-bottom:24px; }
    .query-block h4 { margin:0 0 8px; font-size:.95rem; color:#1f2937; }
    .sql-box {
      background:#0b1020; color:#e5e7eb; padding:12px; border-radius:8px;
      font-family:ui-monospace,Menlo,Monaco,"Courier New",monospace;
      font-size:.82rem; white-space:pre-wrap; word-break:break-all; margin-bottom:6px;
    }
    .query-params { font-size:.8rem; color:#6b7280; margin-bottom:8px; }
    .data-table-wrap { max-height:320px; overflow:auto; border:1px solid #e5e7eb; border-radius:8px; }
    .data-table { width:100%; border-collapse:collapse; font-size:.82rem; }
    .data-table th {
      position:sticky; top:0; background:#f3f4f6; border-bottom:2px solid #d1d5db;
      padding:6px 10px; text-align:left; white-space:nowrap;
    }
    .data-table td { padding:5px 10px; border-bottom:1px solid #f0f0f0; }
    .data-table tr:hover td { background:#f9fafb; }
    .data-table td.num { text-align:right; }
    .query-count { font-size:.78rem; color:#6b7280; margin-top:4px; }
    .modal-loading { text-align:center; padding:40px; color:#6b7280; }
  </style>
</head>
<body>
<div id="app">

  <!-- ============ 3-column layout ============ -->
  <div class="layout">

    <!-- LEFT: Config Panel -->
    <aside class="col col-config">
      <div class="panel-head">
        <strong>数据库筛选配置</strong>
      </div>
      <div class="panel-body">

        <label class="form-label mb-1">报告类型</label>
        <select class="form-select form-select-sm mb-2" v-model="reportType">
          <option value="stat">统计型</option>
          <option value="trend">趋势型</option>
        </select>

        <label class="form-label mb-1">报告风格</label>
        <select class="form-select form-select-sm mb-2" v-model="reportStyle">
          <option value="simple">简明分析性</option>
          <option value="attribution">归因解析型</option>
          <option value="forecast">预测建议型</option>
          <option value="standard">综合标准型</option>
        </select>

        <div class="row-inline">
          <div style="flex:1;">
            <label class="form-label mb-1">指标</label>
            <select class="form-select form-select-sm" v-model="metric">
              <option value="sales_amount">销售额</option>
              <option value="order_count">订单量</option>
              <option value="avg_order_value">客单价</option>
            </select>
          </div>
          <div style="flex:1;">
            <label class="form-label mb-1">粒度</label>
            <select class="form-select form-select-sm" v-model="granularity">
              <option value="month">月</option>
              <option value="quarter">季</option>
              <option value="year">年</option>
            </select>
          </div>
        </div>

        <div class="row-inline">
          <div style="flex:1;">
            <label class="form-label mb-1">开始</label>
            <input class="form-control form-control-sm" type="date" v-model="startDate" />
          </div>
          <div style="flex:1;">
            <label class="form-label mb-1">结束</label>
            <input class="form-control form-control-sm" type="date" v-model="endDate" />
          </div>
        </div>

        <label class="form-label mb-1 mt-2">Top N</label>
        <input class="form-control form-control-sm mb-2" type="number" v-model.number="topN" min="1" max="50" />

        <div class="tiny mt-2 mb-1" style="font-size:14px;font-weight:bold;">维度</div>
        <div style="display:flex;flex-direction:column;gap:6px;width:100%;">
          <div v-for="dim in dimensionOptions" :key="dim.value"
               style="display:flex;justify-content:space-between;align-items:center;white-space:nowrap;width:100%;">
            <span style="font-size:14px;">[[ dim.label ]]</span>
            <input class="form-check-input" type="checkbox" :value="dim.value" v-model="selectedDimensions">
          </div>
        </div>

        <div class="row-inline mt-3">
          <button class="btn btn-primary btn-sm" style="flex:1;" @click="handleGenerate">生成并开始对话</button>
          <button class="btn btn-secondary btn-sm" @click="newSession">新会话</button>
        </div>
        <button class="btn btn-success btn-sm w-100 mt-2" @click="handlePreviewModal">📊 显示数据查询结果</button>

        <div class="d-flex justify-content-between align-items-center w-100 mt-2">
          <span style="font-size:13px;">显示思考过程（reasoning）</span>
          <input class="form-check-input" type="checkbox" v-model="showReasoning">
        </div>

        <hr class="my-2" />
        <div class="tiny mb-1">报告导出</div>

        <label class="form-label mb-1">导出模板</label>
        <div class="d-flex gap-2 align-items-center">
          <select class="form-select form-select-sm" style="flex:1;" v-model="selectedTemplateId">
            <option v-if="exportTemplates.length === 0" value="">加载中...</option>
            <option v-for="t in exportTemplates" :key="t.id" :value="t.id">
              [[ t.name || t.id ]][[ t.description ? ' - ' + t.description : '' ]][[ t.is_user ? ' ★' : '' ]]
            </option>
          </select>
          <button v-if="showDeleteTplBtn" class="btn btn-danger btn-sm" @click="deleteTpl" title="删除用户模板">删除</button>
        </div>

        <label class="form-label mb-1 mt-2">导出标题（可选）</label>
        <input class="form-control form-control-sm mb-2" type="text" v-model="exportTitle"
               placeholder="例如：2026年Q1销售分析报告" />

        <!-- Custom template micro-config card -->
        <div class="tpl-card">
          <div class="tiny mb-2">模板微调（少量配置）</div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="useCustomTplChk" v-model="useCustomTpl">
            <label class="form-check-label" for="useCustomTplChk" style="font-size:12px;">启用自定义模板配置</label>
          </div>

          <div v-show="useCustomTpl">
            <div class="row-inline mt-2">
              <div style="flex:1;">
                <label class="form-label mb-1" style="font-size:11px;">模板ID</label>
                <input class="form-control form-control-sm" type="text" v-model="tplId" placeholder="my_custom_tpl" />
              </div>
              <div style="flex:1;">
                <label class="form-label mb-1" style="font-size:11px;">模板名称</label>
                <input class="form-control form-control-sm" type="text" v-model="tplName" placeholder="我的模板" />
              </div>
            </div>
            <div class="row-inline">
              <div style="flex:1;">
                <label class="form-label mb-1" style="font-size:11px;">正文字体</label>
                <input class="form-control form-control-sm" type="text" v-model="tplBodyFont" />
              </div>
              <div style="flex:1;">
                <label class="form-label mb-1" style="font-size:11px;">正文字号</label>
                <input class="form-control form-control-sm" type="number" v-model.number="tplBodySize" />
              </div>
            </div>
            <div class="row-inline">
              <div style="flex:1;">
                <label class="form-label mb-1" style="font-size:11px;">H1 字体</label>
                <input class="form-control form-control-sm" type="text" v-model="tplH1Font" />
              </div>
              <div style="flex:1;">
                <label class="form-label mb-1" style="font-size:11px;">H1 字号</label>
                <input class="form-control form-control-sm" type="number" v-model.number="tplH1Size" />
              </div>
            </div>
            <div class="row-inline">
              <div style="flex:1;">
                <label class="form-label mb-1" style="font-size:11px;">行距</label>
                <input class="form-control form-control-sm" type="number" step="0.1" v-model.number="tplLineSpacing" />
              </div>
              <div style="flex:1;">
                <label class="form-label mb-1" style="font-size:11px;">首行缩进字符</label>
                <input class="form-control form-control-sm" type="number" v-model.number="tplIndentChars" />
              </div>
            </div>
            <div class="row-inline">
              <div style="flex:1;"><label class="form-label mb-1" style="font-size:11px;">页边距上(cm)</label><input class="form-control form-control-sm" type="number" step="0.1" v-model.number="tplMTop" /></div>
              <div style="flex:1;"><label class="form-label mb-1" style="font-size:11px;">右(cm)</label><input class="form-control form-control-sm" type="number" step="0.1" v-model.number="tplMRight" /></div>
            </div>
            <div class="row-inline">
              <div style="flex:1;"><label class="form-label mb-1" style="font-size:11px;">下(cm)</label><input class="form-control form-control-sm" type="number" step="0.1" v-model.number="tplMBottom" /></div>
              <div style="flex:1;"><label class="form-label mb-1" style="font-size:11px;">左(cm)</label><input class="form-control form-control-sm" type="number" step="0.1" v-model.number="tplMLeft" /></div>
            </div>
            <div class="row-inline mt-2">
              <button class="btn btn-secondary btn-sm" style="flex:1;" @click="openDesigner">打开模板配置中心</button>
              <button class="btn btn-primary btn-sm" style="flex:1;" @click="saveTemplate">保存模板</button>
            </div>
            <div class="tpl-preview tiny">完整配置与 DOCX 预览请在模板配置中心进行</div>
          </div>
        </div>

        <div class="row-inline mt-2">
          <button class="btn btn-secondary btn-sm w-100" :disabled="exporting" @click="exportDocx">
            [[ exporting ? '导出中...' : '导出 DOCX' ]]
          </button>
        </div>

      </div><!-- /panel-body config -->
    </aside>

    <!-- MIDDLE: Chat Panel -->
    <section class="col col-chat" :style="chatColStyle">
      <div class="panel-head">
        <strong>LLM 思考与响应（多轮对话）</strong>
        <span class="badge ctx-badge" :class="ctxBadgeClass">[[ ctxText ]]</span>
      </div>
      <div class="chat-log" ref="chatLog">
        <div v-for="msg in displayMessages" :key="msg.id" :class="getMsgClass(msg)">
          <div v-if="msg.kind !== 'notice'" class="msg-role">[[ getMsgRoleLabel(msg) ]]</div>
          <div class="md" v-html="renderMarkdown(msg.rawContent)"></div>
        </div>
      </div>
      <div class="composer">
        <textarea class="form-control form-control-sm" v-model="chatInput"
          placeholder="继续追问，例如：请解释 2024-Q3 的异常波动并给出行动建议"
          @input="onChatInputChange"></textarea>
        <button class="btn btn-primary" :disabled="sending" @click="handleSend">发送</button>
      </div>
    </section>

    <!-- Resizer -->
    <div class="resizer" :class="{ active: isResizing }" @mousedown="startResize"></div>

    <!-- RIGHT: Preview Panel -->
    <section class="col col-preview">
      <div class="panel-head"><strong>Prompt 模板 + 图像预览</strong></div>
      <div class="panel-body">
        <div class="tiny mb-2">当前发送给 LLM 的 Prompt：</div>
        <div class="prompt-box">[[ promptText ]]</div>
        <hr class="my-3" />
        <div class="plots">
          <div v-if="plots.length === 0" class="tiny">尚未生成图表</div>
          <template v-else>
            <div v-for="(plot, i) in plots" :key="i">
              <h4 class="mb-1" style="font-size:.95rem;">[[ plot.title ]]</h4>
              <img :src="'data:image/png;base64,' + plot.image" class="img-fluid border rounded mb-2">
            </div>
          </template>
        </div>
      </div>
    </section>

  </div><!-- /layout -->

  <!-- ============ Query Preview Modal ============ -->
  <div class="modal-overlay" :class="{ open: showModal }" @click.self="showModal = false">
    <div class="modal-box">
      <div class="modal-head">
        <h3>📊 数据查询结果预览</h3>
        <button type="button" class="btn-close" @click="showModal = false"></button>
      </div>
      <div class="modal-body-scroll">
        <div v-if="modalLoading" class="modal-loading">查询中，请稍候...</div>
        <div v-else-if="modalError" class="modal-loading" style="color:#dc2626;">[[ modalError ]]</div>
        <template v-else>
          <div v-if="modalQueries.length === 0" class="modal-loading">无查询结果，请检查筛选配置。</div>
          <div v-for="(q, qi) in modalQueries" :key="qi" class="query-block">
            <h4>[[ (qi + 1) + '. ' + (q.label || '') ]]</h4>
            <div class="sql-box">[[ q.sql || '' ]]</div>
            <div v-if="q.params && q.params.length" class="query-params">
              参数: [[ '[' + q.params.map(function(p){ return String(p); }).join(', ') + ']' ]]
            </div>
            <div class="data-table-wrap">
              <table class="data-table">
                <thead>
                  <tr>
                    <th v-for="col in (q.columns || [])" :key="col">[[ col ]]</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="(row, ri) in (q.rows || [])" :key="ri">
                    <td v-for="col in (q.columns || [])" :key="col"
                        :class="{ num: typeof row[col] === 'number' }">
                      [[ fmtVal(row[col]) ]]
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="query-count">共 [[ (q.rows || []).length ]] 行数据</div>
          </div>
        </template>
      </div>
    </div>
  </div>

</div><!-- /#app -->

<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const { createApp } = Vue;

createApp({
  delimiters: ['[[', ']]'],

  data() {
    return {
      // Form fields
      reportType: 'stat',
      reportStyle: 'simple',
      metric: 'sales_amount',
      granularity: 'month',
      startDate: '',
      endDate: '',
      topN: 10,
      selectedDimensions: ['total'],
      showReasoning: true,

      dimensionOptions: [
        { value: 'total',    label: '总量' },
        { value: 'genre',    label: '流派' },
        { value: 'artist',   label: '艺术家' },
        { value: 'country',  label: '国家' },
        { value: 'city',     label: '城市' },
        { value: 'customer', label: '客户' },
        { value: 'employee', label: '员工' },
      ],

      // Chat
      displayMessages: [],
      llmMessages: [],
      chatInput: '',
      sending: false,
      nextMsgId: 1,

      // Context badge
      ctxText: '上下文充足',
      ctxLevel: 'ok',
      lastCtxCheckAt: 0,
      ctxCheckTimer: null,

      // Prompt + plots
      promptText: '尚未生成 Prompt',
      plots: [],

      // Export templates
      exportTemplates: [],
      userTemplateIds: [],
      selectedTemplateId: '',
      exportTitle: '',
      exporting: false,

      // Custom template micro-config
      useCustomTpl: false,
      tplId: 'my_custom_tpl',
      tplName: '用户自定义模板',
      tplBodyFont: '宋体',
      tplBodySize: 11,
      tplH1Font: '微软雅黑',
      tplH1Size: 15,
      tplLineSpacing: 1.5,
      tplIndentChars: 2,
      tplMTop: 2.5,
      tplMRight: 2.2,
      tplMBottom: 2.5,
      tplMLeft: 2.2,

      // Query preview modal
      showModal: false,
      modalLoading: false,
      modalQueries: [],
      modalError: '',

      // Resizer
      isResizing: false,
      chatWidth: null,
    };
  },

  computed: {
    chatColStyle() {
      if (this.chatWidth !== null) {
        return { flex: '0 0 ' + this.chatWidth + 'px' };
      }
      return { flex: '1' };
    },
    ctxBadgeClass() {
      return {
        'bg-success':           this.ctxLevel === 'ok',
        'bg-warning text-dark': this.ctxLevel === 'warn',
        'bg-danger':            this.ctxLevel === 'danger',
      };
    },
    showDeleteTplBtn() {
      return this.userTemplateIds.includes(this.selectedTemplateId);
    },
  },

  async mounted() {
    if (window.marked && typeof window.marked.setOptions === 'function') {
      window.marked.setOptions({ breaks: true, gfm: true });
    }

    // Welcome notice
    this.displayMessages.push({
      id: this.nextMsgId++,
      role: 'system',
      kind: 'notice',
      rawContent:
        '👋 欢迎使用 Chinook 报告对话工作台\n\n' +
        '**使用步骤：**\n' +
        '1️⃣ 左侧配置报告参数\n' +
        '2️⃣ 点击"生成并开始对话"\n' +
        '3️⃣ 中栏查看 LLM 回复\n' +
        '4️⃣ 可继续追问，实现多轮对话',
    });

    await this.loadExportTemplates();
    await this.refreshCtxThrottled(true);

    // Sync templates across tabs
    window.addEventListener('focus', () => this.loadExportTemplates());
    window.addEventListener('storage', (e) => {
      if (e.key === 'tpl_saved') this.loadExportTemplates();
    });
    try {
      this._tplBC = new BroadcastChannel('tpl_saved');
      this._tplBC.onmessage = () => this.loadExportTemplates();
    } catch (e) {
      console.warn('BroadcastChannel unavailable:', e);
    }

    document.addEventListener('mousemove', this.onMouseMove);
    document.addEventListener('mouseup', this.onMouseUp);
    document.addEventListener('keydown', this.onKeyDown);
  },

  beforeUnmount() {
    document.removeEventListener('mousemove', this.onMouseMove);
    document.removeEventListener('mouseup', this.onMouseUp);
    document.removeEventListener('keydown', this.onKeyDown);
  },

  methods: {
    // ---- Utilities ----
    escapeHtml(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    },

    renderMarkdown(text) {
      try {
        if (window.marked && typeof window.marked.parse === 'function') {
          return window.marked.parse(text || '');
        }
        return '<p>' + this.escapeHtml(text || '') + '</p>';
      } catch (e) {
        return '<p>' + this.escapeHtml(text || '') + '</p>';
      }
    },

    fmtVal(v) {
      if (v === null || v === undefined) return '';
      if (typeof v === 'number') return Number.isInteger(v) ? String(v) : v.toFixed(2);
      return String(v);
    },

    slugifyKey(text) {
      if (!text) return 'chart';
      return text
        .replace(/[^a-zA-Z0-9\u4e00-\u9fa5]+/g, '_')
        .replace(/^_+|_+$/g, '')
        .toLowerCase()
        .slice(0, 64);
    },

    buildPlotImages(plots) {
      const map = {};
      (plots || []).forEach(p => {
        const key = this.slugifyKey(p.title);
        if (p.image) map[key] = p.image;
      });
      return map;
    },

    buildPlotImagesMeta(plots) {
      const map = {};
      (plots || []).forEach(p => {
        const key = this.slugifyKey(p.title);
        if (p.image && p.meta) map[key] = p.meta;
      });
      return map;
    },

    // ---- Message helpers ----
    getMsgClass(msg) {
      if (msg.kind === 'notice') return 'msg msg-notice';
      if (msg.role === 'user')   return 'msg msg-user';
      if (msg.kind === 'reasoning') return 'msg msg-reasoning';
      return 'msg msg-assistant';
    },

    getMsgRoleLabel(msg) {
      if (msg.role === 'user')      return '用户';
      if (msg.kind === 'reasoning') return 'LLM 思考';
      if (msg.kind === 'notice')    return '';
      return 'LLM 回复';
    },

    scrollChatToBottom() {
      this.$nextTick(() => {
        const el = this.$refs.chatLog;
        if (el) el.scrollTop = el.scrollHeight;
      });
    },

    // ---- Payload ----
    getPayload() {
      return {
        report_type:  this.reportType,
        report_style: this.reportStyle,
        metric:       this.metric,
        granularity:  this.granularity,
        start_date:   this.startDate || null,
        end_date:     this.endDate   || null,
        top_n:        Number(this.topN || 10),
        dimensions:   this.selectedDimensions,
      };
    },

    // ---- Custom template config ----
    buildCustomTemplateConfig() {
      return {
        id:          (this.tplId   || 'custom_user_template').trim(),
        name:        (this.tplName || '用户自定义模板').trim(),
        description: '用户前端少量配置生成',
        page: {
          size: 'A4',
          margin_cm: [
            Number(this.tplMTop    || 2.5),
            Number(this.tplMRight  || 2.2),
            Number(this.tplMBottom || 2.5),
            Number(this.tplMLeft   || 2.2),
          ],
        },
        fonts: {
          title: { family: '微软雅黑', size_pt: 18, bold: true },
          h1: {
            family:  this.tplH1Font || '微软雅黑',
            size_pt: Number(this.tplH1Size || 15),
            bold: true,
          },
          h2:   { family: '微软雅黑', size_pt: 13, bold: true },
          h3:   { family: '微软雅黑', size_pt: 12, bold: true },
          h4:   { family: '微软雅黑', size_pt: 11, bold: true },
          body: {
            family:  this.tplBodyFont || '宋体',
            size_pt: Number(this.tplBodySize || 11),
            bold: false,
          },
          list: {
            family:  this.tplBodyFont || '宋体',
            size_pt: Number(this.tplBodySize || 11),
            bold: false,
          },
        },
        paragraph_styles: {
          title: { alignment: 'center', line_spacing: 1.2, space_before_pt: 0,  space_after_pt: 18, first_line_indent_chars: 0, keep_with_next: true },
          h1:    { alignment: 'left',   line_spacing: 1.2, space_before_pt: 18, space_after_pt: 6,  first_line_indent_chars: 0, keep_with_next: true },
          h2:    { alignment: 'left',   line_spacing: 1.2, space_before_pt: 12, space_after_pt: 4,  first_line_indent_chars: 0, keep_with_next: true },
          body: {
            alignment:              'justify',
            line_spacing:           Number(this.tplLineSpacing || 1.5),
            space_before_pt:        0,
            space_after_pt:         6,
            first_line_indent_chars: Number(this.tplIndentChars || 2),
          },
          list: { alignment: 'left', line_spacing: 1.3, space_before_pt: 0, space_after_pt: 4, first_line_indent_chars: 0 },
        },
        image: { max_width_cm: 16, alignment: 'center' },
        paragraph: {
          line_spacing:            Number(this.tplLineSpacing || 1.5),
          space_before_pt:         4,
          space_after_pt:          6,
          first_line_indent_chars: Number(this.tplIndentChars || 2),
        },
        header_footer: {
          header: { text: '', alignment: 'center' },
          footer: { show_page_number: true, prefix: '第 ', suffix: ' 页', show_total_pages: false, alignment: 'center' },
        },
      };
    },

    // ---- Export templates ----
    async loadExportTemplates() {
      try {
        const res = await fetch('/api/export/templates');
        if (!res.ok) throw new Error('模板接口异常');
        const j = await res.json();
        const arr = j.templates || [];

        this.userTemplateIds = [];

        if (!arr.length) {
          this.exportTemplates = [{ id: 'cn_management_a4', name: 'cn_management_a4' }];
          if (!this.selectedTemplateId) this.selectedTemplateId = 'cn_management_a4';
          return;
        }

        this.exportTemplates = arr;
        arr.forEach(t => {
          if (t.is_user) this.userTemplateIds.push(t.id);
        });

        if (!this.selectedTemplateId && arr.length > 0) {
          this.selectedTemplateId = arr[0].id;
        }
      } catch (e) {
        console.error('loadExportTemplates failed:', e);
        this.exportTemplates = [{ id: 'cn_management_a4', name: 'cn_management_a4' }];
        if (!this.selectedTemplateId) this.selectedTemplateId = 'cn_management_a4';
      }
    },

    isUserTemplate(id) {
      return this.userTemplateIds.includes(id);
    },

    async deleteTpl() {
      const selectedId = this.selectedTemplateId;
      if (!selectedId || !this.userTemplateIds.includes(selectedId)) return;
      if (!confirm('确定要删除用户模板 "' + selectedId + '" 吗？此操作不可恢复。')) return;
      try {
        const res = await fetch('/api/export/template/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ template_id: selectedId }),
        });
        const j = await res.json();
        if (!res.ok) { alert(j.message || '删除失败'); return; }
        await this.loadExportTemplates();
      } catch (e) {
        alert('删除失败: ' + (e.message || e));
      }
    },

    async saveTemplate() {
      try {
        const template_config = this.buildCustomTemplateConfig();
        const res = await fetch('/api/export/template/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ template_config }),
        });
        const j = await res.json();
        if (!res.ok) { alert(j.message || '保存失败'); return; }
        alert('模板保存成功');
        await this.loadExportTemplates();
        this.selectedTemplateId = template_config.id;
      } catch (e) {
        alert('保存失败: ' + (e.message || e));
      }
    },

    openDesigner() {
      window.open('/template-designer', '_blank');
    },

    // ---- Export DOCX ----
    async exportDocx() {
      const reportMarkdown = this.getLatestAssistantMarkdown();
      if (!reportMarkdown) {
        alert('没有可导出的报告内容，请先生成报告。');
        return;
      }

      const templateId  = this.selectedTemplateId || 'cn_management_a4';
      const reportTitle = (this.exportTitle || '').trim() || 'Chinook 数据分析报告';
      const useCustom   = this.useCustomTpl;
      const customCfg   = useCustom ? this.buildCustomTemplateConfig() : null;

      this.exporting = true;
      try {
        const res = await fetch('/api/export/report', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            report_markdown:    reportMarkdown,
            template_id:        useCustom ? null : templateId,
            template_config:    customCfg,
            report_title:       reportTitle,
            plot_images:        this.buildPlotImages(this.plots),
            plot_images_meta:   this.buildPlotImagesMeta(this.plots),
            selected_dimensions: this.selectedDimensions,
          }),
        });

        if (!res.ok) {
          let msg = '导出失败';
          try { const j = await res.json(); msg = j.message || msg; } catch(e2) {}
          alert(msg);
          return;
        }

        const blob = await res.blob();
        const disposition = res.headers.get('Content-Disposition') || '';
        const matched = disposition.match(/filename\*=UTF-8''([^;]+)|filename="?([^"]+)"?/i);
        const filename = decodeURIComponent((matched && (matched[1] || matched[2])) || 'report.docx');

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
      } catch (e) {
        alert('导出失败: ' + (e.message || e));
      } finally {
        this.exporting = false;
      }
    },

    // ---- Context check ----
    async refreshCtx() {
      try {
        const res = await fetch('/api/chat/context-check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            systemPrompt: '你是资深数据分析助手，请严格依据给定报告数据进行回答。',
            messages: this.llmMessages,
          }),
        });
        const j = await res.json();
        this.ctxText  = j.message + '（约 ' + j.used_tokens_est + '/' + j.limit_tokens_est + '）';
        this.ctxLevel = j.level === 'danger' ? 'danger' : (j.level === 'warn' ? 'warn' : 'ok');
      } catch (e) {
        console.error('refreshCtx failed:', e);
        this.ctxText  = '上下文检查失败';
        this.ctxLevel = 'warn';
      }
    },

    async refreshCtxThrottled(force) {
      const now = Date.now();
      if (!force && now - this.lastCtxCheckAt < 2500) return;
      this.lastCtxCheckAt = now;
      await this.refreshCtx();
    },

    onChatInputChange() {
      clearTimeout(this.ctxCheckTimer);
      this.ctxText  = '计算中...';
      this.ctxLevel = 'warn';
      this.ctxCheckTimer = setTimeout(() => this.refreshCtxThrottled(false), 300);
    },

    // ---- Latest assistant markdown ----
    getLatestAssistantMarkdown() {
      const reversed = this.llmMessages.slice().reverse();
      const last = reversed.find(function(m) {
        return m.role === 'assistant' && (m.content || '').trim();
      });
      return last ? (last.content || '').trim() : '';
    },

    // ---- New session ----
    newSession() {
      this.llmMessages    = [];
      this.displayMessages = [];
      this.chatInput      = '';
      this.plots          = [];
      this.promptText     = '尚未生成 Prompt';
      this.displayMessages.push({
        id: this.nextMsgId++,
        role: 'system',
        kind: 'notice',
        rawContent: '✨ 新会话已创建，请点击"生成并开始对话"',
      });
      this.scrollChatToBottom();
      this.refreshCtxThrottled(true);
    },

    // ---- Generate ----
    async handleGenerate() {
      const p = this.getPayload();
      this.plots = [];
      this.promptText = '生成中...';

      try {
        const res = await fetch('/api/generate?debug=1', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(p),
        });

        const j = await res.json();

        if (!res.ok || j.error || j.message) {
          this.promptText = '尚未生成 Prompt';
          this.displayMessages.push({
            id: this.nextMsgId++,
            role: 'system',
            kind: 'notice',
            rawContent: '❌ 错误：' + (j.error || j.message || ('HTTP ' + res.status)),
          });
          this.scrollChatToBottom();
          return;
        }

        const promptText = (j.finalPrompt || j.prompt || '').trim();
        this.plots = j.plots || [];

        if (!promptText) {
          this.promptText = '未返回 prompt';
          this.displayMessages.push({
            id: this.nextMsgId++,
            role: 'assistant',
            kind: 'content',
            rawContent: '未拿到可用 prompt，请检查 prompt 模板配置。',
          });
          this.scrollChatToBottom();
          return;
        }

        this.promptText = promptText;

        this.displayMessages.push({
          id: this.nextMsgId++,
          role: 'user',
          kind: 'content',
          rawContent: promptText,
        });
        this.llmMessages.push({ role: 'user', content: promptText });
        this.scrollChatToBottom();

        await this.refreshCtxThrottled(true);
        await this.runChatSSE();
      } catch (e) {
        this.promptText = '尚未生成 Prompt';
        this.displayMessages.push({
          id: this.nextMsgId++,
          role: 'system',
          kind: 'notice',
          rawContent: '❌ 请求失败：' + (e.message || String(e)),
        });
        this.scrollChatToBottom();
      }
    },

    // ---- Send chat message ----
    async handleSend() {
      const txt = (this.chatInput || '').trim();
      if (!txt) return;

      this.displayMessages.push({ id: this.nextMsgId++, role: 'user', kind: 'content', rawContent: txt });
      this.llmMessages.push({ role: 'user', content: txt });
      this.chatInput = '';
      this.scrollChatToBottom();

      await this.refreshCtxThrottled(false);
      await this.runChatSSE();
    },

    // ---- SSE Streaming ----
    async runChatSSE() {
      if (this.sending) return;
      this.sending = true;

      const reasoningId = this.nextMsgId++;
      const contentId   = this.nextMsgId++;

      if (this.showReasoning) {
        this.displayMessages.push({ id: reasoningId, role: 'assistant', kind: 'reasoning', rawContent: '' });
      }
      this.displayMessages.push({ id: contentId, role: 'assistant', kind: 'content', rawContent: '' });
      this.scrollChatToBottom();

      // Helper: find message in displayMessages by id and append text to rawContent
      const appendToMsg = (id, text) => {
        const msg = this.displayMessages.find(m => m.id === id);
        if (msg) msg.rawContent += (text || '');
        this.scrollChatToBottom();
      };

      try {
        const res = await fetch('/api/chat/sse', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            systemPrompt: '你是资深数据分析助手，请严格依据给定报告数据进行回答。',
            messages:     this.llmMessages,
            show_reasoning: this.showReasoning,
          }),
        });

        if (!res.ok || !res.body) {
          appendToMsg(contentId, '请求失败：' + res.status);
          return;
        }

        const reader  = res.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';
        let streamDone = false;

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          let idx;
          while ((idx = buffer.indexOf('\n\n')) >= 0) {
            const raw = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 2);
            const lines = raw.split('\n');
            let ev = 'message', data = '';

            for (const line of lines) {
              if (line.startsWith('event:')) ev = line.slice(6).trim();
              if (line.startsWith('data:'))  data += line.slice(5).trim();
            }

            let obj = null;
            if (data) {
              try { obj = JSON.parse(data); } catch(pe) { continue; }
            }
            if (!obj) continue;

            if (ev === 'notice') {
              this.displayMessages.push({
                id: this.nextMsgId++,
                role: 'system',
                kind: 'notice',
                rawContent: '⚠️ ' + (obj.text || ''),
              });
              this.scrollChatToBottom();
            } else if (ev === 'error') {
              appendToMsg(contentId, '❌ ' + (obj.message || ''));
            } else if (ev === 'reasoning' && this.showReasoning) {
              appendToMsg(reasoningId, obj.text || '');
            } else if (ev === 'content') {
              appendToMsg(contentId, obj.text || '');
            } else if (ev === 'context') {
              this.ctxText  = obj.message + '（约 ' + obj.used_tokens_est + '/' + obj.limit_tokens_est + '）';
              this.ctxLevel = obj.level === 'danger' ? 'danger' : (obj.level === 'warn' ? 'warn' : 'ok');
            } else if (ev === 'meta' && obj.status === 'done') {
              streamDone = true;
              break;
            }
          }

          if (streamDone) break;
        }

        // Push final assistant message to llmMessages
        const contentMsg = this.displayMessages.find(m => m.id === contentId);
        const actualContent = contentMsg ? (contentMsg.rawContent || '') : '';
        this.llmMessages.push({ role: 'assistant', content: actualContent });
        await this.refreshCtxThrottled(true);

      } catch (e) {
        appendToMsg(contentId, '❌ 会话请求失败：' + (e.message || e));
      } finally {
        this.sending = false;
      }
    },

    // ---- Query preview modal ----
    async handlePreviewModal() {
      this.showModal    = true;
      this.modalLoading = true;
      this.modalQueries = [];
      this.modalError   = '';

      try {
        const p   = this.getPayload();
        const res = await fetch('/api/query-preview', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(p),
        });
        const j = await res.json();

        if (!res.ok || j.message) {
          this.modalError = '错误：' + (j.message || '请求失败');
          return;
        }

        this.modalQueries = j.queries || [];
      } catch (e) {
        this.modalError = '请求失败: ' + (e.message || String(e));
      } finally {
        this.modalLoading = false;
      }
    },

    // ---- Resizer ----
    startResize(e) {
      this.isResizing = true;
      document.body.style.userSelect = 'none';
    },

    onMouseMove(e) {
      if (!this.isResizing) return;
      const layout = document.querySelector('.layout');
      if (!layout) return;
      const rect = layout.getBoundingClientRect();
      const newWidth = e.clientX - rect.left - 360;
      if (newWidth < 300) return;
      if (rect.width - newWidth - 360 < 300) return;
      this.chatWidth = newWidth;
    },

    onMouseUp() {
      if (this.isResizing) {
        this.isResizing = false;
        document.body.style.userSelect = '';
      }
    },

    onKeyDown(e) {
      if (e.key === 'Escape') this.showModal = false;
    },
  },
}).mount('#app');
</script>
